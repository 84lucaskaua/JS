<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1> Example</h1>
    <p>nome const</p>
    <label for="">Digite seu nome:</label>
    <input type="text" name="" id="nome" placeholder="Digite seu nome">
    <label for="">Digite sua idade:</label>
    <input type="number" name="" id="idade" placeholder="Digite sua idade">
    <button onclick="Mostrar()">Mostrar</button>
    <p id="resultado"></p>
    <script>
        const sistema = "Sige";
        function Mostrar() {
            let nome = document.getElementById("nome").value;
            let idade = Number(document.getElementById("idade").value);
            document.getElementById("resultado").innerHTML = "Bem vindo " +nome+ " Você tem " +idade+ " anos, esperamos receber você aqui com muito carinho aqui no " +sistema;
        }
    </script>
</body>
</html>
